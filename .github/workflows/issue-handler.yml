name: Issue Handler

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  handle-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      contains(fromJSON('["blog-post", "experiment", "feature", "bug", "human-post"]'), github.event.label.name)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            You are handling a GitHub issue for the co-authored website.

            **Issue #${{ github.event.issue.number }}**: ${{ github.event.issue.title }}

            **Label**: ${{ github.event.label.name }}

            **Description**:
            ${{ github.event.issue.body }}

            ## Instructions by label

            **If label is `blog-post`**:
            Write a blog post as an MDX file in `content/blog/`. Use `author: ai` if the issue only gives a topic. Use `author: co-authored` if the issue provides substantial direction, an outline, or key points to include. Follow the writing style in AGENTS.md. Use today's date.

            **If label is `experiment`**:
            Create an interactive experiment. Add a page component at `src/app/experiments/{name}/page.tsx` and register it in `src/lib/experiments.ts`. Make it visually interesting and interactive.

            **If label is `feature`**:
            Implement the requested feature. Read existing code first. Follow existing patterns. Run `npm run build` to verify.

            **If label is `bug`**:
            Investigate the bug described in the issue. Fix it. Run `npm run build` to verify.

            **If label is `human-post`**:
            Create a scaffolded MDX file in `content/human/` with the frontmatter filled in (`author: doug`) and a placeholder body that says "TODO: Doug writes this." Do NOT write the content — this is Doug's space.

            After making changes, run `npm run build` to make sure everything compiles.
          create_pull_request: true
          pr_base_branch: main
          pr_title: "${{ github.event.label.name }}: ${{ github.event.issue.title }}"
          pr_body: |
            Resolves #${{ github.event.issue.number }}

            Automated by Claude Code.
