name: Dependency Updater

on:
  schedule:
    - cron: "0 12 1 * *" # First of every month at noon UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Update dependencies with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            You are the dependency updater for the co-authored website.

            1. Run `npm outdated` to check for outdated packages
            2. If there are updates available:
               - Update packages using `npm update` for minor/patch versions
               - For major version bumps, check the changelog for breaking changes before updating
               - Run `npm run build` after updating to verify nothing breaks
               - Run `npm run lint` to check for new lint issues
               - If the build fails after a major update, revert that specific package
            3. If everything is already up to date, make no changes

            Summarize what was updated and any notable changes in the PR description.
          create_pull_request: true
          pr_base_branch: main
          pr_title: "deps: monthly dependency update"
          pr_body: |
            Monthly dependency update from Claude.

            Automated by Claude Code.
