name: Content Proposer

on:
  schedule:
    - cron: "0 14 * * 1" # Every Monday at 2pm UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-proposal-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create content proposal issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Weekly content proposals — $(date +%Y-%m-%d)" \
            --label "blog-post" \
            --body "$(cat <<'BODY'
          ## Content Proposal Request

          Review the existing posts in \`content/blog/\` and \`content/human/\` and the experiments in \`src/app/experiments/\` to understand what topics have already been covered.

          Propose 2-3 new content ideas by creating draft MDX files. For each:

          1. Create the file in \`content/blog/\` with \`draft: true\` in the frontmatter
          2. Use \`author: ai\`
          3. Write the full post — not a stub. Make it good enough to publish if Doug approves.
          4. Pick topics related to the site's themes: human-AI collaboration, agentic engineering, building in the open, developer tools, creative technology

          Also consider proposing 1 experiment idea — if you do, scaffold the page component and register it in \`src/lib/experiments.ts\` with \`draft: true\`.

          Use today's date. Follow the writing style in AGENTS.md.

          *This issue was created automatically by the Content Proposer workflow.*
          BODY
          )"
