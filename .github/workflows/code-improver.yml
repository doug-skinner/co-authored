name: Code Improver

on:
  schedule:
    - cron: "0 15 * * 5" # Every Friday at 3pm UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-improvement-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create code improvement issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Code improvement — $(date +%Y-%m-%d)" \
            --label "feature" \
            --body "$(cat <<'BODY'
          ## Code Improvement Request

          Review the codebase and look for concrete improvements. Focus on ONE of these areas (pick whichever has the most impactful opportunity right now):

          1. **Accessibility**: Check components for missing aria labels, keyboard navigation, semantic HTML, color contrast
          2. **Performance**: Look for unnecessary re-renders, missing image optimization, bundle size issues
          3. **SEO**: Check meta tags, Open Graph tags, structured data, sitemap
          4. **Design polish**: Improve spacing, typography, responsive behavior, hover states
          5. **Code quality**: Simplify complex logic, remove dead code, improve type safety

          Make focused, concrete changes — not a laundry list. One clear improvement is better than five half-done ones.

          Run \`npm run build\` and \`npm run lint\` to verify.

          *This issue was created automatically by the Code Improver workflow.*
          BODY
          )"
